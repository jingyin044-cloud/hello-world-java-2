name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'adopt'
        java-version: '17'

    - name: Build with Gradle
      run: gradle build

    - name: Run Unit Test
      run: gradle test

    - name: Generate code coverage
      run: gradle jacocoTestReport

    - name: Run Program
      run: java -jar build/libs/hello-world-java-V1.jar